services:
  db:
    image: postgres:16
    container_name: lqa-panel-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo:
    image: ${ODOO_IMAGE:-odoo:18.0}
    container_name: lqa-panel-odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ODOO_PORT:-8069}:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons
    command: ["odoo", "--dev=reload,qweb,xml"]

volumes:
  odoo-db-data:
  odoo-web-data:
